    <style>
        :root {
            --gold: #e8c96a;
            --gold-dim: #a8903d;
            --bg: #080808;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #e8e4dc;
            --text-muted: #888;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'DM Mono', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            overflow-y: auto; overflow-x: hidden;
            font-family: var(--font-mono);
            background-color: var(--bg);
            color: var(--text);
        }

        #glCanvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 0;
        }

        #hero {
            position: relative; z-index: 10;
            min-height: 100vh;
            display: flex; flex-direction: column;
            justify-content: flex-end;
            padding: 0 5vw 6vh;
        }

        .hero-inner {
            display: flex; flex-direction: column; gap: 1.5rem;
            width: 100%;
        }

        .hero-eyebrow {
            font-family: var(--font-mono); font-size: clamp(10px,1.1vw,14px);
            letter-spacing: 0.25em; text-transform: uppercase; color: var(--gold);
            opacity: 0; animation: fadeUp 0.8s ease 0.1s forwards;
            text-shadow: 0 1px 12px rgba(0,0,0,0.9), 0 0 40px rgba(0,0,0,0.7);
        }

        .hero-name {
            font-family: var(--font-display); font-size: clamp(3rem,9vw,8rem);
            font-weight: 800; line-height: 0.95; letter-spacing: -0.02em; margin: 0;
            color: var(--text); opacity: 0; animation: fadeUp 0.9s ease 0.25s forwards;
            text-shadow: 0 2px 20px rgba(0,0,0,0.95), 0 0 60px rgba(0,0,0,0.8);
        }
        .hero-name span { color: var(--gold); }

        .hero-tagline {
            font-family: var(--font-mono); font-size: clamp(11px,1.3vw,16px);
            color: var(--text-muted); max-width: 440px; line-height: 1.6; margin: 0;
            opacity: 0; animation: fadeUp 0.9s ease 0.4s forwards;
            text-shadow: 0 1px 12px rgba(0,0,0,0.95), 0 0 30px rgba(0,0,0,0.8);
        }

        .hero-footer {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1.5rem;
            opacity: 0; animation: fadeUp 0.9s ease 0.55s forwards;
        }

        .social-row { display: flex; align-items: center; gap: 0.75rem; }

        .social-btn {
            display: flex; align-items: center; justify-content: center;
            width: 42px; height: 42px;
            background: var(--surface); border: 1px solid var(--border); border-radius: 50%;
            cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease; padding: 0;
        }
        .social-btn:hover { transform: translateY(-3px); border-color: var(--gold-dim); background: rgba(232,201,106,0.1); }
        .social-btn img { width: 20px; height: 20px; object-fit: contain; filter: brightness(0.85); transition: filter 0.2s; }
        .social-btn:hover img { filter: brightness(1.1); }

        .shader-btn {
            font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
            color: var(--gold); background: rgba(232,201,106,0.08); border: 1px solid var(--gold-dim);
            border-radius: 999px; padding: 10px 22px; cursor: pointer; transition: background 0.2s, transform 0.2s;
        }
        .shader-btn:hover { background: rgba(232,201,106,0.18); transform: scale(1.05); }

        .divider { width: 60px; height: 2px; background: var(--gold-dim); margin: 0 auto 2.5rem; opacity: 0.5; }

        #core {
            position: relative; z-index: 10;
            background: linear-gradient(to bottom, transparent, var(--bg) 6rem);
            padding: 8rem 5vw 6rem;
        }

        .section-label {
            font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--text-muted); text-align: center; margin-bottom: 2rem;
        }

        #site-footer {
            position: relative; z-index: 10; background: var(--bg);
            border-top: 1px solid var(--border); padding: 3rem 5vw;
            display: flex; flex-direction: column; align-items: center; gap: 1.5rem; text-align: center;
        }
        .footer-copy { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); letter-spacing: 0.05em; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 650px) {
            .hero-footer { flex-direction: column; align-items: flex-start; }
        }

        /* ── ITCH MINIPLAYER ─────────────────────────────────────── */
        .itch-player-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            background: #000;
        }
        .itch-player-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        #modalItchPlayer .modal-tools-label {
            margin-bottom: 0.6rem;
        }
    </style>
</head>

            el.addEventListener('mouseleave', () => { vid.pause(); vid.currentTime = 0; });
        }

        // click: open modal
        el.addEventListener('click', () => openModal(p));

        return el;
    }

    function platformLabel(pt) {
        const map = { web:'🌐 Web', mobile:'📱 Mobile', steam:'🎮 Steam', epic:'⚡ Epic', unreleased:'🔒 Unreleased', quest:'🥽 Quest' };
        return map[pt] || pt;
    }

    function getFiltered() {
        let list = PROJECTS.slice();

        if (activeEngine !== 'all') {
            list = list.filter(p => p.engine === activeEngine);
        }
        if (activePlatform) {
            list = list.filter(p => p.platforms.includes(activePlatform));
        }

        if (activeSort === 'alpha') {
            list.sort((a, b) => a.title.localeCompare(b.title));
        } else if (activeSort === 'date-new') {
            list.sort((a, b) => new Date(b.date) - new Date(a.date));
        } else if (activeSort === 'date-old') {
            list.sort((a, b) => new Date(a.date) - new Date(b.date));
        }

        return list;
    }

    function renderGallery() {
        const gallery = document.getElementById('mainGallery');
        gallery.innerHTML = '';
        const list = getFiltered();

        if (list.length === 0) {
            gallery.innerHTML = '<div class="gallery-empty">No projects match the current filters.</div>';
            return;
        }

        list.forEach(p => gallery.appendChild(buildCard(p)));
    }

    // ── MODAL ─────────────────────────────────────────────────────
    const modal = document.getElementById('gallery-modal');
    const modalVideo = document.getElementById('modalVideo');
    const modalImg = document.getElementById('modalImg');

    function openModal(p) {
        document.getElementById('modalTitle').textContent = p.title;
        document.getElementById('modalDesc').textContent = p.desc;

        // media
        modalImg.src = p.cover;
        modalImg.alt = p.title;
        const hasVideo = p.video && p.video !== 'Assets/Videos/MissingFootage.webp';
        if (hasVideo) {
            modalVideo.innerHTML = `<source src="${p.video}" type="video/webm">`;
            modalVideo.classList.add('active');
            modalVideo.load();
            modalVideo.play().catch(() => {});
        } else {
            modalVideo.innerHTML = '';
            modalVideo.classList.remove('active');
            modalVideo.pause();
        }

        // info row
        const infoRow = document.getElementById('modalInfoRow');
        infoRow.innerHTML = `<span class="modal-date">📅 ${p.year}</span>
      <span class="modal-tag">${p.engine.toUpperCase()}</span>
      ${p.platforms.map(pt => `<span class="modal-tag">${platformLabel(pt)}</span>`).join('')}`;

        // tools
        const toolsSec = document.getElementById('modalToolsSection');
        const toolsRow = document.getElementById('modalTools');
        if (p.tools && p.tools.length) {
            toolsRow.innerHTML = p.tools.map(t => `<span class="tool-chip">${t}</span>`).join('');
            toolsSec.style.display = '';
        } else {
            toolsSec.style.display = 'none';
        }

        // itch miniplayer
        const itchPlayer = document.getElementById('modalItchPlayer');
        const itchFrame = document.getElementById('itchFrame');
        const itchLink = p.links.find(l => l.itch);
        if (itchLink) {
            itchFrame.src = itchLink.url + '?secret=&border_width=0';
            itchPlayer.style.display = '';
        } else {
            itchFrame.src = '';
            itchPlayer.style.display = 'none';
        }

        // links (exclude itch embed links from button row)
        const linksRow = document.getElementById('modalLinks');
        linksRow.innerHTML = p.links.filter(l => !l.itch).map(l =>
            `<a class="modal-link-btn" href="${l.url}" target="_blank" rel="noopener">${l.label}</a>`
        ).join('');

        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        modal.classList.remove('open');
        modalVideo.pause();
        modalVideo.classList.remove('active');
        // unload itch iframe to stop game audio/cpu
        document.getElementById('itchFrame').src = '';
        document.getElementById('modalItchPlayer').style.display = 'none';
        document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ── FILTERS ───────────────────────────────────────────────────
    document.getElementById('engineFilters').addEventListener('click', e => {
        const btn = e.target.closest('[data-engine]');
        if (!btn) return;
        document.querySelectorAll('[data-engine]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeEngine = btn.dataset.engine;
        renderGallery();
    });

    document.getElementById('platformFilters').addEventListener('click', e => {
        const btn = e.target.closest('[data-platform]');
        if (!btn) return;
        const val = btn.dataset.platform;
        if (activePlatform === val) {
            btn.classList.remove('active');
            activePlatform = null;
        } else {
            document.querySelectorAll('[data-platform]').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            activePlatform = val;
        }
        renderGallery();
    });

    document.getElementById('sortFilters').addEventListener('click', e => {
        const btn = e.target.closest('[data-sort]');
        if (!btn) return;
        document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSort = btn.dataset.sort;
        renderGallery();
    });

    // initial render
    renderGallery();
</script>

</body>
</html>
